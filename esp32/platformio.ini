; ============================================================
; Nexus AI OS - ESP32 Home Automation Firmware v2.0
; PlatformIO Configuration — Enhanced
; ============================================================

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino

; Upload settings
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Partition scheme - huge app (3MB app, 1MB SPIFFS)
board_build.partitions = huge_app.csv

; Build flags (v2.0)
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DARDUINO_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM=0
    -DFW_VERSION=\"2.0.0\"
    -DDEVICE_NAME=\"NexusHome-ESP32\"
    -DASYNC_TCP_SSL_ENABLED=0
    -std=gnu++17
    -Wall
    -Wno-unused-variable
build_unflags = -std=gnu++11

; Library dependencies
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit NeoPixel@^1.12.0
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    crankyoldgit/IRremoteESP8266@^2.8.6
    arduino-libraries/NTPClient@^3.2.1

; Extra filesystem (SPIFFS)
board_build.filesystem = spiffs

; Debug settings
debug_tool = esp-prog
debug_init_break = tbreak setup

; OTA settings
upload_protocol = esptool
; For OTA: uncomment below and comment esptool above
; upload_protocol = espota
; upload_port = nexus-home.local
; upload_flags =
;     --auth=nexus_ota_pass

[platformio]
default_envs = esp32dev
src_dir = src
